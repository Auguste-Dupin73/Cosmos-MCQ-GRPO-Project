seed: 42

model:
  name_or_path: Qwen/Qwen3-4B-Base
  tokenizer_name_or_path: Qwen/Qwen3-4B-Base
  trust_remote_code: true
  local_files_only: false
  torch_dtype: bfloat16
  model_init_kwargs:
    attn_implementation: sdpa
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_compute_dtype: bfloat16
    bnb_4bit_use_double_quant: true

peft:
  enabled: true
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  dataset_format: source_episode
  train_paths:
    - outputs/200_sample/episodes.jsonl
  include_support_pack: false
  append_response_format: true
  shuffle_train: true
  eval_split: 0
  max_train_samples: null
  max_eval_samples: 0

training:
  output_dir: outputs/training/qwen4b_l4_full
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-6
  warmup_steps: 5
  max_steps: 40
  num_train_epochs: 3
  logging_strategy: steps
  logging_steps: 2
  logging_first_step: true
  eval_strategy: "no"
  save_strategy: steps
  save_steps: 10
  save_total_limit: 5
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  report_to: []
  max_completion_length: 96
  num_generations: 2
  num_generations_eval: 1
  steps_per_generation: 2
  temperature: 0.8
  top_p: 1.0
  top_k: 0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  remove_unused_columns: false
  use_vllm: false
  log_completions: false
  save_safetensors: true
  auto_resume: true
  run_final_eval: false

reward:
  full_credit: 1.0
  main_and_probe_credit: 0.7
  main_only_credit: 0.4
  correct_option_wrong_reasoning_credit: 0.25
  failure_credit: 0.0

eval:
  batch_size: 1
  max_new_tokens: 96
  do_sample: false
  temperature: 0.8
  top_p: 1.0
  top_k: 0
  force_cpu: false
